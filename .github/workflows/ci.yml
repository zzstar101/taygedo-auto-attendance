name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    if: github.repository == 'zzstar101/taygedo-auto-attendance'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Cloudflare Worker build smoke test
        run: pnpm worker:build

      - name: Docker build smoke test
        run: docker build -t taygedo-auto-attendance:ci .
